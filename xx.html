<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoAPI AI Hub</title>
    <!-- 使用全球最稳定的 cdnjs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/globe.gl/2.32.0/globe.gl.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; font-family: sans-serif; }
        #globeViz { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        
        .header {
            position: absolute; top: 30px; left: 40px; z-index: 10;
            background: rgba(255, 255, 255, 0.9); padding: 15px 25px;
            border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .header h1 { margin: 0; font-size: 24px; color: #0284c7; }
        .header p { margin: 5px 0 0 0; font-size: 13px; color: #64748b; }

        .node-marker {
            padding: 6px 12px; border-radius: 20px; font-size: 12px;
            font-weight: bold; color: white; border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); pointer-events: none;
            white-space: nowrap; text-align: center;
        }

        .float-anim { animation: float 3s ease-in-out infinite; }
        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1.2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .moapi-core {
            background: #0ea5e9; font-size: 14px; position: relative;
        }
        .moapi-core::after {
            content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 20px; border: 2px solid #0ea5e9;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>MoAPI AI Hub</h1>
        <p>全球大模型数据分发网络中心 · 新加坡</p>
    </div>

    <div id="globeViz"></div>

    <script>
        // 1. 数据
        const moapi = { id: 'moapi', name: 'MoAPI Hub', lat: 1.3521, lng: 103.8198, type: 'core', color: '#0ea5e9' };
        
        const models = [
            { id: 'deepseek', name: 'DeepSeek', lat: 39.9, lng: 116.4, color: '#2563eb', delay: '' },
            { id: 'qwen', name: '通义千问', lat: 30.2, lng: 120.1, color: '#6366f1', delay: 'delay-1' },
            { id: 'minimax', name: 'MiniMax', lat: 31.2, lng: 121.4, color: '#ec4899', delay: 'delay-2' },
            { id: 'openai', name: 'ChatGPT', lat: 37.7, lng: -122.4, color: '#10b981', delay: 'delay-1' },
            { id: 'claude', name: 'Claude', lat: 39.0, lng: -120.0, color: '#d946ef', delay: 'delay-2' },
            { id: 'mistral', name: 'Mistral', lat: 48.8, lng: 2.3, color: '#f97316', delay: '' }
        ];

        const arcsData = models.map(node => ({
            startLat: moapi.lat, startLng: moapi.lng,
            endLat: node.lat, endLng: node.lng,
            color: [moapi.color, node.color]
        }));

        // 2. 初始化
        const world = Globe()(document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-light.jpg')
            .globeColor('#caced9') // 兜底颜色
            .backgroundColor('#f0f4f8')
            .showAtmosphere(true)
            .atmosphereColor('#8ba0b3')
            .atmosphereAltitude(0.2)
            
            // 连线
            .arcsData(arcsData)
            .arcColor('color')
            .arcDashLength(0.4)
            .arcDashGap(0.2)
            .arcDashInitialGap(() => Math.random())
            .arcDashAnimateTime(2000)
            .arcStroke(1)
            
            // 标签
            .htmlElementsData([moapi, ...models])
            .htmlElement(d => {
                const el = document.createElement('div');
                if (d.type === 'core') {
                    el.className = 'node-marker moapi-core';
                    el.innerHTML = `🌟 ${d.name}`;
                } else {
                    el.className = `node-marker float-anim ${d.delay}`;
                    el.style.backgroundColor = d.color;
                    el.innerHTML = d.name;
                }
                return el;
            });

        // 3. 视角
        world.pointOfView({ lat: 30, lng: 140, altitude: 2.5 });
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;

        // 修复渲染尺寸问题
        setTimeout(() => {
            world.width(window.innerWidth);
            world.height(window.innerHeight);
        }, 100);

        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(window.innerHeight);
        });
    </script>
</body>
</html>
